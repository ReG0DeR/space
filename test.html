<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Форма послуг 100/100 — преміум версія</title>
    <style>
      :root {
        --focus-color: #2563eb;
        --active-bg: #f0f9ff;
        --hint-color: #b91c1c;
        --muted-color: #6b7280;
        --success-color: #16a34a;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto;
        padding: 18px;
        color: #111827;
      }
      fieldset {
        border: 1px solid #e5e7eb;
        padding: 12px;
        margin-bottom: 12px;
      }
      legend {
        font-weight: 600;
        padding: 0 6px;
      }
      .option {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 2px;
        border-radius: 4px;
        transition: background 0.2s;
      }
      label {
        cursor: pointer;
        transition: background 0.2s;
        padding: 2px 6px;
        border-radius: 4px;
      }
      label.active {
        background: var(--active-bg);
      }
      input[type="number"],
      input[type="text"] {
        width: 100px;
        padding: 6px;
        border: 1px solid #d1d5db;
        border-radius: 4px;
      }
      button {
        margin-left: 8px;
        padding: 6px 10px;
        border-radius: 4px;
        border: 1px solid #d1d5db;
        background: #fff;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #f3f4f6;
      }
      input:focus,
      button:focus,
      input[type="checkbox"]:focus + label {
        outline: 2px solid var(--focus-color);
        outline-offset: 2px;
      }
      .hint {
        font-size: 0.9em;
        margin-top: 4px;
        color: var(--hint-color);
      }
      .muted {
        font-size: 0.95em;
        color: var(--muted-color);
      }
      .success {
        color: var(--success-color);
      }
      #service-list {
        margin-top: 8px;
      }
      .summary {
        margin-top: 8px;
        font-weight: 600;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
      }
      #confettiCanvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0; /* було 9999 */
      }
    </style>
  </head>
  <body>
    <form id="service-form" aria-describedby="form-hint" novalidate>
      <fieldset>
        <legend>Виберіть послуги</legend>
        <div class="option">
          <input
            id="s-hair"
            type="checkbox"
            name="service"
            value="50"
            data-name="Стрижка"
          />
          <label for="s-hair">Стрижка — 50 грн</label>
        </div>
        <div class="option">
          <input
            id="s-manicure"
            type="checkbox"
            name="service"
            value="100"
            data-name="Манікюр"
          />
          <label for="s-manicure">Манікюр — 100 грн</label>
        </div>
        <div class="option">
          <input
            id="s-massage"
            type="checkbox"
            name="service"
            value="200"
            data-name="Масаж"
          />
          <label for="s-massage">Масаж — 200 грн</label>
        </div>
      </fieldset>

      <div style="margin-bottom: 8px">
        <label for="massageHours">Додаткові години масажу</label><br />
        <input
          id="massageHours"
          type="number"
          name="massageHours"
          min="0"
          step="1"
          value="0"
          data-price="100"
          aria-label="Додаткові години масажу"
        />
        <div
          id="hours-hint"
          class="hint"
          role="status"
          aria-live="polite"
          aria-atomic="true"
        >
          Крок: 1 година
        </div>
      </div>

      <div style="margin-bottom: 8px">
        <label for="promo">Промокод (SAVE50 HALF10)</label><br />
        <input
          id="promo"
          type="text"
          name="promo"
          maxlength="20"
          inputmode="text"
          aria-label="Промокод"
        />
        <button id="applyPromo" type="button">Застосувати</button>
        <div
          id="promo-hint"
          class="hint"
          role="status"
          aria-live="polite"
          aria-atomic="true"
        ></div>
      </div>

      <div id="form-hint" class="muted">
        Виберіть послуги та введіть години. Стан зберігається локально.
      </div>
    </form>

    <h4>Вибрані послуги</h4>
    <ul id="service-list" aria-live="polite"></ul>
    <h4 class="summary">
      Загальна сума:
      <span id="total" aria-live="polite" data-prev-total="0">0 грн</span>
    </h4>
    <canvas id="confettiCanvas"></canvas>

    <script>
      (() => {
        const CONFIG = {
          LS_KEY: "serviceForm.v5",
          SCHEMA_VERSION: 1,
          MAX_HOURS: 4,
          STEP: 1,
          PER_HOUR_DEFAULT: 100,
          CURRENCY_LOCALE: "uk-UA",
          CURRENCY_OPTIONS: {
            style: "currency",
            currency: "UAH",
            maximumFractionDigits: 2,
          },
          CONFETTI_DURATION: 2000,
        };

        const form = document.getElementById("service-form");
        const totalEl = document.getElementById("total");
        const listEl = document.getElementById("service-list");
        const hoursInput = document.getElementById("massageHours");
        const promoInput = document.getElementById("promo");
        const applyPromoBtn = document.getElementById("applyPromo");
        const hoursHint = document.getElementById("hours-hint");
        const promoHint = document.getElementById("promo-hint");
        const massageCheckbox = document.getElementById("s-massage");

        const currency = new Intl.NumberFormat(
          CONFIG.CURRENCY_LOCALE,
          CONFIG.CURRENCY_OPTIONS,
        );
        const PROMOS = {
          SAVE50: { type: "fixed", amount: 50 },
          HALF10: { type: "percent", amount: 10 },
        };

        const parseNum = (v) => {
          const n = parseFloat(String(v ?? "").trim());
          return Number.isFinite(n) ? n : 0;
        };
        const debounce = (fn, ms = 200) => {
          let t;
          return (...a) => {
            clearTimeout(t);
            t = setTimeout(() => fn(...a), ms);
          };
        };

        // Потрібно: CONFIG.CONFETTI_DURATION (ms) і CONFIG.COLORS або COLORS локально
        const DEFAULT_COLORS = [
          "#f59e0b",
          "#10b981",
          "#3b82f6",
          "#ef4444",
          "#a78bfa",
          "#f472b6",
        ];
        const canvas = document.getElementById("confettiCanvas");
        const ctx = canvas.getContext("2d");
        let W = (canvas.width = innerWidth);
        let H = (canvas.height = innerHeight);
        window.addEventListener("resize", () => {
          W = canvas.width = innerWidth;
          H = canvas.height = innerHeight;
        });

        const particles = [];

        class Particle {
          constructor(x, y, color, speed, angle, size, lifeMs) {
            this.x = x;
            this.y = y;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.size = size;
            this.color = color;
            this.life = lifeMs; // ms
            this.age = 0;
            this.alpha = 1;
          }
          update(dt) {
            // simple physics
            this.vx *= 0.995;
            this.vy *= 0.995;
            this.vy += 0.06 * (dt / 16); // gravity scaled by frame delta
            this.x += this.vx * (dt / 16);
            this.y += this.vy * (dt / 16);
            this.age += dt;
            this.alpha = Math.max(0, 1 - this.age / this.life);
          }
          draw(ctx) {
            if (this.alpha <= 0) return;
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }
        }

        let lastTs = performance.now();
        function loop(ts) {
          const dt = Math.min(40, ts - lastTs);
          lastTs = ts;
          // motion blur background
          ctx.clearRect(0, 0, W, H);

          for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.update(dt);
            p.draw(ctx);
            if (p.age >= p.life || p.y > H + 50) particles.splice(i, 1);
          }
          requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);

        // Функція створення вибуху частинок
        function burst(x, y, count = 80, lifeMs = 1200) {
          const colors =
            typeof CONFIG !== "undefined" && CONFIG.COLORS
              ? CONFIG.COLORS
              : DEFAULT_COLORS;
          for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 2 + Math.random() * 6;
            const size = 1 + Math.random() * 4;
            const color = colors[Math.floor(Math.random() * colors.length)];
            particles.push(
              new Particle(
                x,
                y,
                color,
                speed,
                angle,
                size,
                lifeMs + Math.random() * 400,
              ),
            );
          }
          // додаткові яскраві спарки
          for (let i = 0; i < Math.floor(count * 0.12); i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 1 + Math.random() * 3;
            particles.push(
              new Particle(
                x,
                y,
                "#ffffff",
                speed,
                angle,
                1 + Math.random() * 1.5,
                lifeMs / 2,
              ),
            );
          }
        }

        // Drop-in заміна launchConfetti
        const launchConfetti = () => {
          const duration =
            typeof CONFIG !== "undefined" && CONFIG.CONFETTI_DURATION
              ? CONFIG.CONFETTI_DURATION
              : 1400;
          const startX = window.innerWidth / 2;
          const startY = H + 10; // старт трохи нижче екрану

          // імітація ракети: підйом до точки вибуху, потім burst
          const peakY = H * 0.25 - Math.random() * 80; // висота вибуху
          const rocketDuration = Math.max(
            400,
            duration * 0.6 + Math.random() * 300,
          );
          const startTime = performance.now();

          function rocketStep(now) {
            const t = Math.min(1, (now - startTime) / rocketDuration);
            const ease = 1 - Math.pow(1 - t, 3);
            const currentY = startY + (peakY - startY) * ease;

            // малюємо коротку білу точку ракети поверх canvas (буде згладжено loop'ом)
            ctx.save();
            ctx.globalCompositeOperation = "lighter";
            ctx.fillStyle = "red";
            ctx.beginPath();
            ctx.arc(startX, currentY, 2 + t * 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            if (t < 1) {
              requestAnimationFrame(rocketStep);
            } else {
              // при завершенні підйому — вибух
              const particlesCount = 60 + Math.floor(Math.random() * 80);
              burst(startX, peakY, particlesCount, duration);
            }
          }
          requestAnimationFrame(rocketStep);
        };

        const scheduleRender = (fn) => {
          if (!window.requestAnimationFrame) return fn();
          requestAnimationFrame(fn);
        };
        const saveState = (state) => {
          try {
            localStorage.setItem(CONFIG.LS_KEY, JSON.stringify(state));
          } catch (e) {}
        };
        const loadState = () => {
          try {
            const raw = localStorage.getItem(CONFIG.LS_KEY);
            if (!raw) return null;
            const parsed = JSON.parse(raw);
            return parsed?.version === CONFIG.SCHEMA_VERSION ? parsed : null;
          } catch (e) {
            return null;
          }
        };

        const readForm = () => {
          const services = Array.from(
            form.querySelectorAll('input[name="service"]:checked'),
          ).map((el) => ({
            id: el.id || el.dataset.name || el.value,
            name: el.dataset.name ?? "Послуга",
            price: parseNum(el.value),
          }));

          let hours = parseNum(hoursInput.value);
          hours = Math.max(
            0,
            Math.min(
              CONFIG.MAX_HOURS,
              Math.round(hours / CONFIG.STEP) * CONFIG.STEP,
            ),
          );
          if (!massageCheckbox.checked) hours = 0;

          const perHour =
            parseNum(hoursInput.dataset.price) || CONFIG.PER_HOUR_DEFAULT;
          const promo = (promoInput.value ?? "")
            .trim()
            .replace(/[^a-zA-Z0-9]/g, "")
            .toUpperCase();
          return { services, hours, perHour, promo };
        };

        const computeTotal = ({ services, hours, perHour, promo }) => {
          const base =
            services.reduce((s, v) => s + v.price, 0) + hours * perHour;
          let discount = 0;
          if (promo && PROMOS[promo]) {
            const p = PROMOS[promo];
            discount =
              p.type === "fixed"
                ? Math.min(p.amount, base)
                : Math.round(base * (p.amount / 100));
          }
          return { base, discount, total: Math.max(0, base - discount) };
        };

        const animateTotal = (from, to) => {
          const steps = 30,
            diff = to - from;
          let i = 0;
          const step = () => {
            i++;
            const val = from + diff * (i / steps);
            totalEl.textContent = currency.format(val);
            if (i < steps) requestAnimationFrame(step);
          };
          step();
        };

        const render = ({
          services,
          hours,
          perHour,
          promo,
          base,
          discount,
          total,
        }) => {
          listEl.innerHTML = "";
          if (services.length === 0 && hours === 0) {
            const li = document.createElement("li");
            li.textContent = "Нічого не вибрано";
            listEl.appendChild(li);
          } else {
            services.forEach((s) => {
              const li = document.createElement("li");
              li.textContent = `${s.name} — ${s.price} грн`;
              listEl.appendChild(li);
            });
            if (hours > 0) {
              const li = document.createElement("li");
              li.textContent = `Додаткові години масажу (${hours} × ${perHour} грн) — ${hours * perHour} грн`;
              listEl.appendChild(li);
            }
          }

          promoHint.classList.remove("success");
          if (promo) {
            if (PROMOS[promo]) {
              promoHint.textContent = `Промокод застосовано: ${PROMOS[promo].type === "percent" ? PROMOS[promo].amount + "%" : currency.format(PROMOS[promo].amount)}`;
              promoHint.classList.add("success");
            } else promoHint.textContent = "Невідомий промокод";
          } else promoHint.textContent = "";

          const prev = parseNum(totalEl.dataset.prevTotal || 0);
          animateTotal(prev, total);
          totalEl.dataset.prevTotal = total;
        };

        const apply = () => {
          const data = readForm();
          const { base, discount, total } = computeTotal(data);
          scheduleRender(() => render({ ...data, base, discount, total }));
          const appliedPromo =
            data.promo && PROMOS[data.promo] ? data.promo : "";
          saveState({
            version: CONFIG.SCHEMA_VERSION,
            services: data.services.map((s) => s.id),
            hours: data.hours,
            promo: appliedPromo,
          });
        };

        const debouncedApply = debounce(apply, 200);

        const syncHoursState = () => {
          const disabled = !massageCheckbox.checked;
          hoursInput.disabled = disabled;
          hoursInput.setAttribute("aria-disabled", String(disabled));
          if (disabled) {
            hoursInput.value = 0;
            hoursHint.textContent = `Крок: ${CONFIG.STEP} година`;
          }
        };

        const restore = () => {
          const st = loadState();
          if (!st) return;
          form.querySelectorAll('input[name="service"]').forEach((inp) => {
            inp.checked =
              st.services.includes(inp.id) ||
              st.services.includes(inp.value) ||
              false;
            const label = form.querySelector(`label[for="${inp.id}"]`);
            if (label) label.classList.toggle("active", inp.checked);
          });
          if (typeof st.hours !== "undefined") hoursInput.value = st.hours;
          if (typeof st.promo === "string") promoInput.value = st.promo;
        };

        form.addEventListener("input", (e) => {
          const t = e.target;
          if (!t) return;
          if (t === hoursInput) debouncedApply();
          if (t === promoInput) {
            promoHint.textContent = "";
            promoHint.classList.remove("success");
          }
        });
        promoInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            applyPromoBtn.click();
          }
        });
        form.addEventListener("change", (e) => {
          const t = e.target;
          if (!t) return;
          if (t.matches('input[name="service"]')) {
            const label = form.querySelector(`label[for="${t.id}"]`);
            if (label) label.classList.toggle("active", t.checked);
            if (t === massageCheckbox) syncHoursState();
            apply();
          } else apply();
        });
        applyPromoBtn.addEventListener("click", async () => {
          const code = (promoInput.value ?? "")
            .trim()
            .replace(/[^a-zA-Z0-9]/g, "")
            .toUpperCase();
          if (!code) {
            promoHint.textContent = "Введіть промокод";
            promoHint.classList.remove("success");
            apply();
            return;
          }
          await new Promise((r) => setTimeout(r, 120));
          if (!PROMOS[code]) {
            promoHint.textContent = "Промокод не знайдено";
            promoHint.classList.remove("success");
          } else {
            promoHint.textContent = "Промокод застосовано";
            promoHint.classList.add("success");
            launchConfetti();
            applyPromoBtn.disabled = true; // <-- тут блокуємо кнопку
          }
          apply();
        });
        form.addEventListener("submit", (e) => e.preventDefault());

        const init = () => {
          hoursInput.step = CONFIG.STEP;
          restore();
          syncHoursState();
          apply();
        };
        if (document.readyState === "loading")
          document.addEventListener("DOMContentLoaded", init);
        else init();
      })();
    </script>
  </body>
</html>

<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Красива Земля і Місяць</title>
    <style>
      body {
        /* Глибокий космічний градієнт */
        background: radial-gradient(
          circle at center,
          #1e293b 0%,
          #0f172a 70%,
          #010411 100%
        );
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        overflow: hidden; /* Щоб зорі не створювали прокрутку */
      }

      .space-scene {
        position: relative;
        width: 500px;
        height: 500px;
      }

      /* Стилізація SVG */
      .space-svg {
        width: 100%;
        height: 100%;
        /* Додаємо перспективу для сцени */
        filter: drop-shadow(0 0 15px rgba(179, 229, 252, 0.2));
      }

      /* --- Анімації --- */

      /* Обертання континентів та хмар (плавний рух поверхні) */
      @keyframes rotateSurface {
        from {
          transform: translateX(0px);
        }
        to {
          transform: translateX(-150px);
        } /* Ширина текстури */
      }

      /* Орбіта Місяця */
      @keyframes orbitMoon {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* Мерехтіння зірок */
      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.3;
          transform: scale(0.8);
        }
        50% {
          opacity: 1;
          transform: scale(1.1);
        }
      }

      /* Класи для анімації */
      .earth-texture {
        animation: rotateSurface 20s infinite linear;
      }

      .cloud-layer {
        animation: rotateSurface 15s infinite linear; /* Хмари рухаються швидше */
        opacity: 0.8;
      }

      .moon-system {
        animation: orbitMoon 25s infinite linear;
        transform-origin: 250px 250px; /* Центр Землі у viewBox */
      }

      /* Генерація випадкових зірок через CSS (для краси) */
      .stars {
        position: absolute;
        width: 1px;
        height: 1px;
        background: transparent;
        box-shadow: 
                /* Багато випадкових цяток-зірок */
          100px 100px #fff,
          200px 300px #fff,
          400px 150px #fff,
          50px 400px #fff,
          350px 450px #fff,
          450px 50px #fff,
          120px 250px #b3e5fc,
          280px 110px #b3e5fc,
          420px 380px #b3e5fc,
          180px 420px #fff,
          310px 210px #fff,
          470px 270px #fff;
        animation: twinkle 4s infinite ease-in-out;
      }
    </style>
  </head>
  <body>
    <div class="space-scene">
      <div class="stars"></div>

      <svg
        class="space-svg"
        viewBox="0 0 500 500"
        xmlns="http://www.w3.org/2000/svg"
      >
        <defs>
          <clipPath id="earth-clip">
            <circle cx="250" cy="250" r="100" />
          </clipPath>

          <radialGradient id="ocean-grad" cx="50%" cy="50%" r="50%">
            <stop offset="60%" stop-color="#1e88e5" />
            <stop offset="100%" stop-color="#0d47a1" />
          </radialGradient>

          <linearGradient id="land-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#81c784" />
            <stop offset="100%" stop-color="#388e3c" />
          </linearGradient>

          <radialGradient id="halo-grad" cx="50%" cy="50%" r="50%">
            <stop offset="85%" stop-color="#b3e5fc" stop-opacity="0" />
            <stop offset="95%" stop-color="#b3e5fc" stop-opacity="0.3" />
            <stop offset="100%" stop-color="#b3e5fc" stop-opacity="0.6" />
          </radialGradient>

          <linearGradient id="shadow-grad" x1="1" y1="0" x2="0" y2="0">
            <stop offset="0%" stop-color="#010411" stop-opacity="0.7" />
            <stop offset="40%" stop-color="#010411" stop-opacity="0.3" />
            <stop offset="60%" stop-color="#010411" stop-opacity="0" />
          </linearGradient>

          <g id="earth-map">
            <path
              d="M0,80 C20,80 30,90 40,110 C50,130 40,150 20,160 S-20,130 0,80 Z
                             M100,50 C120,40 140,50 150,70 S130,110 100,50 Z
                             M120,140 C140,140 150,160 140,180 S100,190 120,140 Z
                             
                             M150,80 C170,80 180,90 190,110 C200,130 190,150 170,160 S130,130 150,80 Z
                             M250,50 C270,40 290,50 300,70 S280,110 250,50 Z
                             M270,140 C290,140 300,160 290,180 S250,190 270,140 Z"
              fill="url(#land-grad)"
            />
          </g>

          <g id="cloud-pattern">
            <path
              d="M20,100 Q40,80 60,100 T100,100 T140,100 T200,100 Q220,120 200,140 T100,140 T20,140 Z
                             M170,100 Q190,80 210,100 T250,100 T290,100 T350,100 Q370,120 350,140 T250,140 T170,140 Z"
              fill="white"
              opacity="0.5"
            />

        </defs>

        <g class="earth-system" transform="translate(0,0)">
          <circle
            cx="250"
            cy="250"
            r="110"
            fill="url(#halo-grad)"
            filter="blur(5px)"
          />

          <circle cx="250" cy="250" r="100" fill="url(#ocean-grad)" />

          <g clip-path="url(#earth-clip)">
            <g class="earth-texture">
              <use
                href="#earth-map"
                transform="translate(-150,150) scale(1.5)"

            <g class="cloud-layer">
              <use
                href="#cloud-pattern"
                transform="translate(-150,160) scale(1.3)"
              />
            </g>
          </g>

          <circle
            cx="250"
            cy="250"
            r="100"
            fill="none"
            stroke="#b3e5fc"
            stroke-width="2"
            opacity="0.3"
          />

          <circle cx="250" cy="250" r="100" fill="url(#shadow-grad)" />
        </g>

        <g class="moon-system">
          <g transform="translate(420, 250)">
            <circle cx="0" cy="0" r="20" fill="#e0e0e0" />
            <radialGradient id="moon-shadow" cx="60%" cy="40%" r="50%">
              <stop offset="60%" stop-color="#fff" stop-opacity="0" />
              <stop offset="100%" stop-color="#424242" stop-opacity="0.8" />
            </radialGradient>
            <circle cx="0" cy="0" r="20" fill="url(#moon-shadow)" />

            <circle cx="-8" cy="-5" r="4" fill="#9e9e9e" opacity="0.5" />
            <circle cx="6" cy="7" r="3" fill="#9e9e9e" opacity="0.5" />
            <circle cx="2" cy="-10" r="2" fill="#9e9e9e" opacity="0.5" />

        </g>
      </svg>
